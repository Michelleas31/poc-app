services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    restart: on-failure
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3307
      - DB_USER=root
      - DB_PASSWORD=123
      - DB_NAME=sistematesis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/.env:/app/.env

volumes:
  mariadb_data: