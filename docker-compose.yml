services:
  poc-mariadb:
    profiles:
      - docker-db
    image: mariadb:11.7
    container_name: poc-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: 123
      MARIADB_DATABASE: sistematesis
      MARIADB_USER: poc_user
      MARIADB_PASSWORD: poc_password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data_dev:/var/lib/mysql
      - ./db/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
      - ./db/migracion_documentos_revision.sql:/docker-entrypoint-initdb.d/02-migracion_documentos_revision.sql:ro
      - ./db/migracion_projectmanager_uiux_flujo.sql:/docker-entrypoint-initdb.d/03-migracion_projectmanager_uiux_flujo.sql:ro
      - ./db/migrations/20260502_frontend_flow_fixes.sql:/docker-entrypoint-initdb.d/04-20260502_frontend_flow_fixes.sql:ro
      - ./db/migrations/20260507_event_aula_flow.sql:/docker-entrypoint-initdb.d/05-20260507_event_aula_flow.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    restart: on-failure
    env_file:
      - ./backend/.env

volumes:
  mariadb_data_dev:
