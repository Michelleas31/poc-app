<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Profesor — ProjectManager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/panel-admin.css">
  <style>
    .proyectos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .proyecto-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; cursor:pointer; transition:border-color .2s,transform .15s; }
    .proyecto-card:hover { border-color:var(--blue); transform:translateY(-2px); }
    .proyecto-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .proyecto-titulo { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; color:var(--text); }
    .proyecto-alumno { font-size:12px; color:var(--text-muted); margin-top:4px; }
    .proyecto-desc { font-size:13px; color:var(--text-dim); line-height:1.5; margin:10px 0; }
    .progress-bar-wrap { margin-top:10px; }
    .progress-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:5px; }
    .progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }
    .proyecto-footer { display:flex; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); flex-wrap:wrap; font-size:12px; color:var(--text-muted); }
    .detalle-back { display:flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:13px; padding:6px 10px; border-radius:8px; margin-bottom:20px; }
    .detalle-back:hover { background:var(--surface2); color:var(--text); }
    .detalle-meta { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
    .meta-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .meta-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .meta-value { font-size:14px; font-weight:500; color:var(--text); }
    .etapa-item { display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; }
    .section-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
    .section-card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; margin-bottom:16px; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><path d="M14 17.5h7M17.5 14v7"/></svg></div>
    <span class="logo-name">ProjectManager</span>
    <span class="logo-badge">Profesor</span>
  </div>
  <nav class="sidebar-nav">
    <span class="nav-section-label">General</span>
    <button class="nav-item active" onclick="showSection('mis-proyectos',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Mis proyectos
    </button>
  </nav>
  <div class="sidebar-user">
    <div class="avatar" id="nav-avatar">P</div>
    <div class="user-info"><div class="user-name" id="nav-nombre">Profesor</div><div class="user-role">Profesor</div></div>
    <button class="btn-logout" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div><div class="page-title" id="page-title">Mis proyectos</div><div class="page-subtitle" id="page-subtitle">Proyectos asignados a ti</div></div>
  </div>
  <div class="content">
    <div class="section active" id="section-mis-proyectos">
      <div class="stats-grid" id="prof-stats"></div>
      <div id="proyectos-grid-prof"></div>
    </div>
    <div class="section" id="section-detalle">
      <button class="detalle-back" onclick="showSection('mis-proyectos')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="15,18 9,12 15,6"/></svg>
        Volver a mis proyectos
      </button>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">
        <div style="flex:1">
          <div class="page-title" id="det-titulo" style="font-size:22px;font-family:'Syne',sans-serif;font-weight:700"></div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px" id="det-alumno"></div>
        </div>
        <span class="badge" id="det-badge"></span>
      </div>
      <div class="detalle-meta" id="det-meta"></div>
      <div class="section-card">
        <div class="progress-bar-wrap" style="margin:0">
          <div class="progress-bar-label"><span style="font-weight:500;font-size:14px">Progreso general</span><span id="det-progreso-pct" style="font-size:14px;font-weight:500"></span></div>
          <div class="progress-bar" style="height:10px;border-radius:6px;margin-top:8px"><div class="progress-bar-fill" id="det-progreso-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="section-card">
        <div class="section-card-title">Etapas del proyecto</div>
        <div id="det-etapas" style="display:flex;flex-direction:column;gap:10px"></div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL: Revisar proyecto (ver detalle + aceptar/rechazar) -->
<div class="modal-overlay" id="modal-revisar">
  <div class="modal" style="max-width:720px">
    <div class="modal-head">
      <h3 id="rev-title">Revisar proyecto</h3>
      <button class="modal-close" onclick="cerrarRevisar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="rev-body">
      <div style="color:var(--text-muted);font-size:13px;padding:16px">Cargando...</div>
    </div>
    <div class="modal-foot" id="rev-foot">
      <button class="btn btn-ghost" onclick="cerrarRevisar()">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot green" id="toast-dot"></div><span id="toast-msg"></span></div>

<script src="../panel-profesor.js"></script>
</body>
</html>
